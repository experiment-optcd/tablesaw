# Test the Java LTS versions and latest version available

name: Modified CI
jobs:
  Tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java-version:
        - 11
        - 17
        os:
        - macOS-latest
        - ubuntu-latest
        - windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Set up JDK $
      uses: actions/setup-java@v1
      with:
        java-version: ${{ matrix.java-version }}
    - name: Test with Maven
      run: mvn test
    name: Tests (${{ matrix.java-version }}, ${{ matrix.os }})
'on':
- push
- workflow_dispatch
